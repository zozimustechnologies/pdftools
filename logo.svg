<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d7ea6"/>
      <stop offset="100%" stop-color="#1a4a6e"/>
    </linearGradient>
    <linearGradient id="fold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a6a90"/>
      <stop offset="100%" stop-color="#0e3050"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- White document body -->
  <path d="M120 76 L328 76 L396 144 L396 436 L120 436 Z" fill="white" opacity="0.97"/>

  <!-- Folded corner (darker fill to look like a real fold) -->
  <path d="M328 76 L328 144 L396 144 Z" fill="url(#fold)" opacity="0.55"/>
  <!-- Fold crease highlight -->
  <line x1="328" y1="76" x2="396" y2="144" stroke="white" stroke-width="3" opacity="0.3"/>

  <!-- "PDF" label in document -->
  <text
    x="157"
    y="225"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="88"
    letter-spacing="-2"
    fill="url(#bg)"
  >PDF</text>

  <!-- Subtle divider line under label -->
  <rect x="157" y="240" width="200" height="5" rx="2.5" fill="#3d7ea6" opacity="0.25"/>

  <!-- Content lines (representing document text) -->
  <rect x="157" y="270" width="196" height="16" rx="8" fill="#a8c8df" opacity="0.55"/>
  <rect x="157" y="302" width="160" height="16" rx="8" fill="#a8c8df" opacity="0.55"/>
  <rect x="157" y="334" width="180" height="16" rx="8" fill="#a8c8df" opacity="0.55"/>
  <rect x="157" y="366" width="120" height="16" rx="8" fill="#a8c8df" opacity="0.45"/>

  <!-- Small wrench / gear badge bottom-right of background (tools hint) -->
  <!-- Gear: circle with teeth -->
  <g transform="translate(358, 358) scale(0.82)">
    <!-- Outer gear ring -->
    <circle cx="54" cy="54" r="42" fill="none" stroke="white" stroke-width="14" opacity="0.92"/>
    <!-- Gear teeth (8 rectangles rotated) -->
    <g fill="white" opacity="0.92">
      <rect x="47" y="4"  width="14" height="20" rx="4"/>
      <rect x="47" y="84" width="14" height="20" rx="4"/>
      <rect x="84" y="47" width="20" height="14" rx="4"/>
      <rect x="4"  y="47" width="20" height="14" rx="4"/>
      <rect x="74" y="14" width="14" height="20" rx="4" transform="rotate(45 81 24)"/>
      <rect x="14" y="74" width="14" height="20" rx="4" transform="rotate(45 21 84)"/>
      <rect x="74" y="74" width="14" height="20" rx="4" transform="rotate(-45 81 84)"/>
      <rect x="14" y="14" width="14" height="20" rx="4" transform="rotate(-45 21 24)"/>
    </g>
    <!-- Inner circle cutout -->
    <circle cx="54" cy="54" r="22" fill="url(#bg)"/>
  </g>
</svg>
